<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- CLAVE PARA CELULAR -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Köa Helados</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <h1>🍦KÖA</h1>

  <h3 id="categoria-actual"></h3>

  <!-- CATEGORÍAS -->
  <div class="categorias">
    <button onclick="cambiarCategoria('Helados')">🍦</button>
    <button onclick="cambiarCategoria('Bebidas')">🥤</button>
    <button onclick="cambiarCategoria('Almacen')">🛒</button>
  </div>

  <!-- PRODUCTOS -->
  <div id="pantalla-productos">
    <div id="productos"></div>
  </div>

  <!-- CARRITO -->
  <div id="pantalla-carrito">
    <h2>🛒 Pedido</h2>

    <button class="btn-secundario" onclick="vaciarCarrito()">Vaciar</button>

    <ul id="carrito"></ul>

    <p id="carrito-vacio"></p>

    <h3 id="total">Total: $0</h3>

    <button class="btn-principal" onclick="finalizarPedido()">
      Finalizar pedido
    </button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
